<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H202 IA - Version Améliorée</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      color: #333;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    header {
      background: #4a3f8c;
      color: white;
      padding: 15px 20px;
      text-align: center;
    }
    #chat {
      height: 450px;
      padding: 20px;
      overflow-y: auto;
      background: #f8f9fa;
    }
    .message {
      margin: 12px 0;
      padding: 12px 16px;
      border-radius: 18px;
      max-width: 80%;
      line-height: 1.5;
    }
    .user {
      background: #4a3f8c;
      color: white;
      align-self: flex-end;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    .ia {
      background: #e9ecef;
      color: #333;
      align-self: flex-start;
      margin-right: auto;
      border-bottom-left-radius: 4px;
    }
    .input-area {
      padding: 15px;
      background: white;
      border-top: 1px solid #eee;
      display: flex;
      gap: 10px;
    }
    #input {
      flex: 1;
      padding: 14px 18px;
      border: 2px solid #ddd;
      border-radius: 30px;
      font-size: 16px;
      outline: none;
    }
    #input:focus {
      border-color: #667eea;
    }
    button {
      padding: 14px 24px;
      border: none;
      border-radius: 30px;
      background: #4a3f8c;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #5a4fa0;
    }
    .clear-btn {
      background: #dc3545;
    }
    .clear-btn:hover {
      background: #c82333;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🤖 H202 IA</h1>
      <p>Version Améliorée - Chat Intelligent</p>
    </header>
    
    <div id="chat"></div>
    
    <div class="input-area">
      <input id="input" type="text" placeholder="Pose-moi une question...">
      <button onclick="envoyer()">Envoyer</button>
      <button onclick="effacer()" class="clear-btn">Effacer</button>
    </div>
  </div>

  <script>
    // Réponses améliorées
    const reponses = {
      "bonjour": "Salut ! Content de te voir 😊 Comment vas-tu aujourd'hui ?",
      "salut": "Hey ! 👋 Prêt à discuter ?",
      "comment ça va": "Je vais super bien, merci ! Et toi ?",
      "ça va": "Nickel ! Et de ton côté ?",
      "montreal": "Ah Montréal ! La plus belle ville du Québec 🇨🇦 Tu y es en ce moment ?",
      "météo": "À Montréal aujourd'hui, il fait plutôt beau ☀️ (mais ça peut changer vite !)",
      "aide": "Je peux répondre à plein de questions simples pour l'instant. Demande-moi ce que tu veux !",
      "qui es-tu": "Je suis H202 IA, une petite intelligence artificielle créée pour discuter avec toi.",
      "merci": "De rien ! 😊 Toujours un plaisir.",
      "au revoir": "À bientôt ! Prends soin de toi 👋",
      "bye": "Bye bye ! À la prochaine."
    };

    function ajouterMessage(texte, type) {
      const chat = document.getElementById("chat");
      const div = document.createElement("div");
      div.className = `message ${type}`;
      div.innerHTML = `<b>${type === 'user' ? 'Toi' : 'H202 IA'} :</b> ${texte}`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function envoyer() {
      const input = document.getElementById("input");
      const texte = input.value.trim();
      
      if (!texte) return;

      // Message de l'utilisateur
      ajouterMessage(texte, "user");

      // Réponse de l'IA
      const cle = texte.toLowerCase();
      let reponse = reponses[cle] || 
                    reponses[cle.split(" ")[0]] || 
                    "Intéressant... Peux-tu me donner plus de détails ? 😊";

      // Petite simulation de réflexion
      setTimeout(() => {
        ajouterMessage(reponse, "ia");
      }, 400);

      input.value = "";
    }

    function effacer() {
      if (confirm("Vider toute la conversation ?")) {
        document.getElementById("chat").innerHTML = "";
      }
    }

    // Envoyer avec la touche Entrée
    document.getElementById("input").addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        envoyer();
      }
    });

    // Message de bienvenue au chargement
    window.onload = () => {
      setTimeout(() => {
        ajouterMessage("Salut ! Je suis H202 IA. En quoi puis-je t'aider aujourd'hui ? 🚀", "ia");
      }, 600);
    };
  </script>
</body>
</html>
