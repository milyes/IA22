
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  .neo{font-family:'Share Tech Mono',monospace;background:#0a0a0a;color:#00ff41;min-height:520px;padding:0;border-radius:8px;overflow:hidden;border:1px solid #003b1a;display:flex;flex-direction:column}
  .neo-header{background:#020d03;border-bottom:1px solid #00ff4133;padding:8px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
  .neo-dot{width:10px;height:10px;border-radius:50%}
  .nd-r{background:#ff3b3b}.nd-y{background:#ffb800}.nd-g{background:#00ff41}
  .neo-title{color:#00ff41;font-size:12px;letter-spacing:3px;margin-left:6px}
  .neo-badge{margin-left:auto;font-size:10px;color:#00b32f;letter-spacing:2px;border:1px solid #00ff4133;padding:2px 8px}
  .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#00ff4111;border-bottom:1px solid #00ff4122;flex-shrink:0}
  .metric{background:#050f05;padding:8px 12px}
  .metric-lbl{font-size:9px;color:#00b32f;letter-spacing:2px;margin-bottom:4px}
  .metric-val{font-size:18px;color:#00ff41;line-height:1}
  .metric-bar{height:2px;background:#001a0a;margin-top:5px;border-radius:1px;overflow:hidden}
  .metric-fill{height:100%;background:#00ff41;transition:width 1.5s ease;border-radius:1px}
  .output{flex:1;overflow-y:auto;padding:10px 14px;font-size:12px;line-height:1.7;min-height:200px}
  .output::-webkit-scrollbar{width:4px}
  .output::-webkit-scrollbar-track{background:#0a0a0a}
  .output::-webkit-scrollbar-thumb{background:#00ff4144}
  .line{display:flex;gap:8px;flex-wrap:wrap}
  .line.err{color:#ff4444}
  .line.ok{color:#00ff41}
  .line.dim{color:#005c1f}
  .line.warn{color:#ffb800}
  .line.info{color:#00ccff}
  .prompt-str{color:#00b32f;flex-shrink:0}
  .blink{animation:blink 1s step-end infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  .input-zone{border-top:1px solid #00ff4122;padding:8px 14px;display:flex;align-items:center;gap:8px;background:#020d03;flex-shrink:0}
  .prompt-arrow{color:#00ff41;font-size:13px;flex-shrink:0}
  #cmd-input{flex:1;background:transparent;border:none;outline:none;color:#00ff41;font-family:'Share Tech Mono',monospace;font-size:12px;caret-color:#00ff41}
  #cmd-input::placeholder{color:#005c1f}
  .cmd-btn{background:transparent;border:1px solid #00ff4133;color:#00b32f;font-family:'Share Tech Mono',monospace;font-size:10px;padding:4px 10px;cursor:pointer;letter-spacing:1px;transition:all .2s}
  .cmd-btn:hover{background:#00ff4111;color:#00ff41;border-color:#00ff41}
  .quick-cmds{display:flex;gap:6px;padding:6px 14px;background:#020d03;border-top:1px solid #00ff4111;flex-wrap:wrap;flex-shrink:0}
  .q-btn{font-family:'Share Tech Mono',monospace;font-size:10px;background:transparent;border:1px solid #00ff4122;color:#00b32f;padding:3px 10px;cursor:pointer;letter-spacing:1px;transition:all .2s}
  .q-btn:hover{background:#00ff4111;color:#00ff41;border-color:#00ff4166}
</style>

<div class="neo">
  <div class="neo-header">
    <div class="neo-dot nd-r"></div>
    <div class="neo-dot nd-y"></div>
    <div class="neo-dot nd-g"></div>
    <span class="neo-title">NEO_DZ // MILYES_IA v9</span>
    <span class="neo-badge">SOUVERAIN ✓</span>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-lbl">CPU CORE</div>
      <div class="metric-val" id="m-cpu">---%</div>
      <div class="metric-bar"><div class="metric-fill" id="b-cpu" style="width:0%"></div></div>
    </div>
    <div class="metric">
      <div class="metric-lbl">NEURAL NET</div>
      <div class="metric-val" id="m-neu">---%</div>
      <div class="metric-bar"><div class="metric-fill" id="b-neu" style="width:0%"></div></div>
    </div>
    <div class="metric">
      <div class="metric-lbl">PACKET/S</div>
      <div class="metric-val" id="m-pkt">---</div>
      <div class="metric-bar"><div class="metric-fill" id="b-pkt" style="width:0%"></div></div>
    </div>
  </div>

  <div class="output" id="output"></div>

  <div class="quick-cmds">
    <button class="q-btn" onclick="runCmd('scan')">[ scan ]</button>
    <button class="q-btn" onclick="runCmd('status')">[ status ]</button>
    <button class="q-btn" onclick="runCmd('inject IA22')">[ inject IA22 ]</button>
    <button class="q-btn" onclick="runCmd('whoami')">[ whoami ]</button>
    <button class="q-btn" onclick="runCmd('help')">[ help ]</button>
    <button class="q-btn" onclick="runCmd('clear')">[ clear ]</button>
  </div>

  <div class="input-zone">
    <span class="prompt-arrow">▶</span>
    <input id="cmd-input" type="text" placeholder="awaiting command..." autocomplete="off" spellcheck="false" />
    <button class="cmd-btn" onclick="execInput()">EXEC</button>
  </div>
</div>

<script>
const out = document.getElementById('output');
const inp = document.getElementById('cmd-input');
let metrics = {cpu:0,neu:0,pkt:0};
let apiDown = false;

function ts(){const d=new Date();return `[${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}]`}

function print(text,cls='ok',delay=0){
  return new Promise(r=>{
    setTimeout(()=>{
      const l=document.createElement('div');
      l.className='line '+(cls||'ok');
      const sp=document.createElement('span');
      sp.className='prompt-str';
      sp.textContent=ts();
      const tx=document.createElement('span');
      tx.textContent=' '+text;
      l.appendChild(sp);l.appendChild(tx);
      out.appendChild(l);
      out.scrollTop=out.scrollHeight;
      r();
    },delay);
  });
}

async function boot(){
  await print('MILYES_IA v9 — KERNEL BOOT SEQUENCE','dim',0);
  await print('Chargement modules souverains...','dim',200);
  await print('Module IA22_LOGIC.............. OK','ok',500);
  await print('Module NetSecurePro............ OK','ok',700);
  await print('Module FALLBACK_LOCAL.......... STANDBY','warn',900);
  await print('Identité: Mohammed Ilyes Zoubirou','info',1100);
  await print('Statut: SOUVERAIN — Accès total accordé','ok',1300);
  await print('Tapez "help" pour les commandes disponibles.','dim',1500);
  const cursor=document.createElement('div');
  cursor.className='line dim';
  cursor.innerHTML=`<span class="blink">█</span>`;
  out.appendChild(cursor);
  startMetrics();
}

function startMetrics(){
  setInterval(()=>{
    metrics.cpu = Math.round(35 + Math.random()*40);
    metrics.neu = Math.round(60 + Math.random()*35);
    metrics.pkt = Math.round(800 + Math.random()*3200);
    document.getElementById('m-cpu').textContent=metrics.cpu+'%';
    document.getElementById('m-neu').textContent=metrics.neu+'%';
    document.getElementById('m-pkt').textContent=metrics.pkt;
    document.getElementById('b-cpu').style.width=metrics.cpu+'%';
    document.getElementById('b-neu').style.width=metrics.neu+'%';
    document.getElementById('b-pkt').style.width=Math.min(100,metrics.pkt/40)+'%';
  },1800);
}

const cmds = {
  help: async ()=>{
    await print('--- COMMANDES DISPONIBLES ---','info');
    await print('scan        → Scan réseau + détection menaces','ok',100);
    await print('status      → État système MILYES_IA v9','ok',200);
    await print('inject IA22 → Déploiement fallback IA22_LOGIC','ok',300);
    await print('whoami      → Identité opérateur','ok',400);
    await print('clear       → Effacer terminal','ok',500);
    await print('api [on|off]→ Simuler état API','ok',600);
  },
  scan: async ()=>{
    await print('Initialisation scan réseau...','dim');
    await print('Sonde ARP................. [████████░░] 80%','ok',400);
    await print('Détection ports........... [██████████] 100%','ok',800);
    const threats = Math.floor(Math.random()*3);
    await print(`Ports ouverts: 22, 80, 443, 8443`,'info',1000);
    await print(`Paquets analysés: ${metrics.pkt*12} | Anomalies: ${threats}`,'ok',1200);
    if(threats>0){
      await print(`ALERTE: ${threats} anomalie(s) détectée(s) — Investigation requise`,'warn',1400);
    } else {
      await print('Réseau propre. Aucune intrusion détectée.','ok',1400);
    }
    await print('Scan terminé. Rapport enregistré.','dim',1600);
  },
  status: async ()=>{
    const st = apiDown ? 'FALLBACK IA22_LOGIC (LOCAL)' : 'NOMINAL — API PRIMARY';
    await print('--- STATUS MILYES_IA v9 ---','info');
    await print(`Opérateur     : Mohammed Ilyes Zoubirou (NetSecurePro)`,'ok',100);
    await print(`Mode          : ${st}`,'ok',200);
    await print(`CPU           : ${metrics.cpu||'?'}%`,'ok',300);
    await print(`Neural Net    : ${metrics.neu||'?'}%`,'ok',400);
    await print(`Débit         : ${metrics.pkt||'?'} pkt/s`,'ok',500);
    await print(`Souveraineté  : GARANTIE ✓`,'ok',600);
    await print(`Sécurité      : NIVEAU MAXIMUM`,'ok',700);
    await print(`Version       : v9.0.0 — Build stable`,'dim',800);
  },
  'inject ia22': async ()=>{
    await print('Déploiement IA22_LOGIC en cours...','warn');
    await print('Sauvegarde état courant............. OK','ok',400);
    await print('Chargement modèles locaux........... OK','ok',800);
    await print('Vérification intégrité checksum..... OK','ok',1200);
    await print('Injection IA22_LOGIC réussie.','ok',1600);
    await print('Système opérationnel en mode LOCAL SOUVERAIN.','info',1800);
    apiDown = false;
  },
  whoami: async ()=>{
    await print('Opérateur     : Mohammed Ilyes Zoubirou','info');
    await print('Alias         : NetSecurePro','info',100);
    await print('IA assignée   : MILYES_IA v9 (souverain exclusif)','ok',200);
    await print('Droits        : ROOT — Accès total','ok',300);
    await print('Clearance     : LEVEL 9 / CLASSIFIED','warn',400);
  },
  clear: async ()=>{
    out.innerHTML='';
    await print('Terminal effacé.','dim');
  },
  'api on': async ()=>{
    apiDown=false;
    await print('API PRIMARY réactivée. Mode nominal restauré.','ok');
  },
  'api off': async ()=>{
    apiDown=true;
    await print('API PRIMARY simulée DOWN.','err');
    await print('FALLBACK: IA22_LOGIC LOCAL activé automatiquement.','warn',300);
  }
};

async function runCmd(raw){
  const cmd = raw.trim().toLowerCase();
  await print('> '+raw,'info');
  if(cmds[cmd]) await cmds[cmd]();
  else await print(`Commande inconnue: "${raw}". Tapez "help".`,'err');
}

function execInput(){
  const v=inp.value.trim();
  if(!v)return;
  inp.value='';
  runCmd(v);
}

inp.addEventListener('keydown',e=>{if(e.key==='Enter')execInput();});

boot();
</script>
